[package]
name = "lx-cli"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[[bin]]
name = "lx"
path = "src/main.rs"

[dependencies]
lx = { path = "../lx" }
clap = { version = "4", features = ["derive"] }
miette = { version = "7", features = ["fancy"] }
serde_json.workspace = true
serde = { workspace = true }
toml = { workspace = true }

[lints]
workspace = true
