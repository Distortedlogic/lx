[package]
name = "lx-desktop"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "lx-desktop"
path = "src/main.rs"

[lib]
name = "lx_desktop"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
pane-tree = { path = "../pane-tree" }
pty-mux = { path = "../pty-mux" }
widget-bridge = { path = "../widget-bridge" }
audio-core = { path = "../audio-core" }
whisper-client = { path = "../whisper-client" }
kokoro-client = { path = "../kokoro-client" }
voice-agent = { path = "../voice-agent" }
browser-cdp = { path = "../browser-cdp" }
anyhow = "1"
async-trait = "0.1"
base64 = "0.22"
dioxus = { version = "0.7", features = ["fullstack", "router"] }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["process"] }
uuid = { version = "1", features = ["v4"] }
axum = { version = "0.8", optional = true }

[features]
default = []
desktop = ["dioxus/desktop"]
server = ["dioxus/server", "dep:axum"]
